<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Remixtest</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div id="loginScreen">
    <div id="loginCard">
      <h1>Remixtopia Multiplayer</h1>
      <p>Enter a name, join the shared server, then mine, plant, jump, and chat with other players.</p>
      <input type="text" id="usernameInput" placeholder="Your name..." maxlength="15" autocomplete="off" autofocus />
      <button id="startButton" type="button">Join Game</button>
    </div>
  </div>
  <canvas id="game" tabindex="0"></canvas>
  <!-- Growtopia-style Floating Inventory Window -->
  <div id="inventoryWindow" class="floating-window" style="display: none;">
    <!-- Persistent dragger: always visible; drag to move, click to collapse/expand -->
    <div class="window-header inv-dragger" id="inventoryHeader">
      <span class="inv-dragger-grip"></span>
      <span class="title">INVENTORY</span>
    </div>

    <!-- Hotbar: 4 quick-access slots, centered directly above the grid -->
    <div id="invQuickRow" class="inv-hotbar"></div>

    <div class="window-content">
      <div class="inv-body">
        <!-- Main inventory grid: 12 columns x 4 rows -->
        <div id="inventoryGrid" class="inventory-grid"></div>
        <!-- Side action menu (vertical, far right) -->
        <div class="inventory-side">
          <button id="btnRecycle" type="button">RECYCLE</button>
          <button id="btnStore" type="button">STORE</button>
          <button id="btnDrop" type="button">DROP</button>
          <button id="btnInfo" type="button">INFO</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Drop Confirmation Dialog Modal -->
  <div id="dropModal" class="floating-window" style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 300; width: min(340px, 90vw); padding: 16px;">
    <div class="window-header" style="border-radius: 6px; margin: -16px -16px 12px -16px; cursor: default;">
      <span class="title">DROP ITEM</span>
    </div>
    <p id="dropModalText" style="margin: 0 0 12px; font-size: 13px; font-weight: bold; text-align: center; color: #eaf6ff; text-shadow: 1px 1px 0 rgba(0,0,0,0.6);"></p>
    <input type="number" id="dropCountInput" value="1" min="1" max="999" style="width: 100%; box-sizing: border-box; padding: 10px; border-radius: 6px; border: 2px solid #84c2d8; background: #142636; color: #fff; font-size: 16px; font-weight: 900; text-align: center; margin-bottom: 16px;" />
    <div style="display: flex; gap: 10px;">
      <button id="dropModalCancel" type="button" style="flex: 1; padding: 10px; border-radius: 6px; border: 2px solid #ff6b6b; background: #c8393c; color: #fff; font-weight: 800; cursor: pointer; text-transform: uppercase;">CANCEL</button>
      <button id="dropModalOk" type="button" style="flex: 1; padding: 10px; border-radius: 6px; border: 2px solid #347a2a; background: #7ed957; color: #10200f; font-weight: 800; cursor: pointer; text-transform: uppercase;">OK (DROP)</button>
    </div>
  </div>
  <div id="touchControls">
    <div class="touchBtn" id="leftBtn">◀</div>
    <div class="touchBtn" id="rightBtn">▶</div>
    <div class="touchBtn" id="jumpBtn">▲</div>
    <div class="touchBtn" id="punchBtn">✊</div>
  </div>
  <div id="networkStatus">Offline</div>
  <div id="chatUI">
    <div id="chatLog"></div>
    <form id="chatForm" autocomplete="off">
      <input id="chatInput" type="text" maxlength="80" placeholder="Press Enter to chat..." />
      <button id="chatSendBtn" type="submit">Send</button>
    </form>
  </div>

  <!-- All game logic now lives in js/*.js as ES modules. main.js imports and
       wires everything together; load order is handled by the module graph. -->
  <script type="module" src="js/main.js"></script>
</body>
</html>
