<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Remixtest</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div id="loginScreen">
    <div id="loginCard">
      <h1>Remixtopia Multiplayer</h1>
      <p>Enter a name, join the shared server, then mine, plant, jump, and chat with other players.</p>
      <input type="text" id="usernameInput" placeholder="Your name..." maxlength="15" autocomplete="off" autofocus />
      <button id="startButton" type="button">Join Game</button>
    </div>
  </div>
  <canvas id="game" tabindex="0"></canvas>
  <!-- New Growtopia-style Floating Inventory Window -->
  <div id="inventoryWindow" class="floating-window" style="display: none;">
    <div class="window-header" id="inventoryHeader">
      <div class="title">Inventory</div>
      <div style="font-size:11px; opacity:0.7;">Drag header to move</div>
    </div>
    
    <div class="window-content">
      <!-- Search Bar -->
      <input type="text" id="inventorySearch" class="inventory-search" placeholder="Enter Item Name...">
      
      <!-- Item Grid -->
      <div id="inventoryGrid" class="inventory-grid"></div>
      
      <!-- Side Action Buttons -->
      <div class="inventory-side">
        <button id="btnRecycle">RECYCLE</button>
        <button id="btnStore">STORE</button>
        <button id="btnDrop">DROP</button>
        <button id="btnInfo">INFO</button>
        <button id="btnFav">FAV</button>
      </div>
    </div>
  </div>
  <div id="touchControls">
    <div class="touchBtn" id="leftBtn">◀</div>
    <div class="touchBtn" id="rightBtn">▶</div>
    <div class="touchBtn" id="jumpBtn">▲</div>
    <div class="touchBtn" id="punchBtn">✊</div>
  </div>
  <div id="networkStatus">Offline</div>
  <div id="chatUI">
    <div id="chatLog"></div>
    <form id="chatForm" autocomplete="off">
      <input id="chatInput" type="text" maxlength="80" placeholder="Press Enter to chat..." />
      <button id="chatSendBtn" type="submit">Send</button>
    </form>
  </div>

  <!-- All game logic now lives in js/*.js as ES modules. main.js imports and
       wires everything together; load order is handled by the module graph. -->
  <script type="module" src="js/main.js"></script>
</body>
</html>
